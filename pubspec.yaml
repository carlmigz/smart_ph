name: smart_ph
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.0
  flutter_hooks: ^0.21.3+1
  flutter_launcher_icons: ^0.14.4
  flutter_screenutil: ^5.9.3
  go_router: ^17.2.1
  ionicons: ^0.2.2

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:

  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true

  remove_alpha_ios: true
  adaptive_icon_background: "#ffffff"
  image_path: "assets/icons/app_icon.jpg"
  adaptive_icon_foreground: "assets/icons/app_icon.jpg"
